<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- Static title/description: the app renders client-side only, so this — not any
		     component markup — is what crawlers and link unfurlers see. -->
		<title>I Got Your Back — background pattern playground</title>
		<meta
			name="description"
			content="Tree-shakeable repeating & generative backgrounds — geometric tiles and WebGL generative art, framework-agnostic with a Svelte wrapper. Try every pattern live: pick a theme, tweak params, and copy the snippet."
		/>

		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
