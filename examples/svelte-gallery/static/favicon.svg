<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
	<!-- On-brand glyph: a soft rounded tile with the warm-orange accent gradient
	     (halo family: #f78f08 accent). Minimal by design — no PWA variants. -->
	<defs>
		<linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0" stop-color="#f78f08" />
			<stop offset="1" stop-color="#ffb37a" />
		</linearGradient>
	</defs>
	<rect x="56" y="56" width="400" height="400" rx="96" fill="url(#warm)" />
	<rect
		x="56"
		y="56"
		width="400"
		height="400"
		rx="96"
		fill="none"
		stroke="#ffffff"
		stroke-opacity="0.35"
		stroke-width="16"
	/>
</svg>
